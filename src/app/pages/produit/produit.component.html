<div class="overflow-hidden rounded-2xl border border-gray-200 bg-white pt-4 dark:border-white/[0.05] dark:bg-white/[0.03]">
  <div class="flex flex-col gap-4 px-6 mb-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
        Liste des produits
      </h3>
    </div>
    <div class="flex items-center gap-3">
      <!-- <app-button (click)="openCreateModal()">
        Ajouter
      </app-button> -->
    </div>
  </div>

  <div class="max-w-full overflow-x-auto">
    <table class="min-w-full">
      <thead class="px-6 py-3.5 border-t border-gray-100 border-y bg-gray-50 dark:border-white/[0.05] dark:bg-gray-900">
        <tr>
          <th class="px-6 py-3 font-medium text-gray-500 sm:px-6 text-theme-xs dark:text-gray-400 text-start">Nom</th>
          <th class="px-6 py-3 font-medium text-gray-500 sm:px-6 text-theme-xs dark:text-gray-400 text-start">Prix</th>
          <th class="px-6 py-3 font-medium text-gray-500 sm:px-6 text-theme-xs dark:text-gray-400 text-start">Nombre</th>
          <!-- <th class="px-6 py-3 font-medium text-gray-500 sm:px-6 text-theme-xs dark:text-gray-400 text-start">Actions</th> -->
        </tr>
      </thead>
      <tbody>
        @if (produits.length === 0) {
        <tr>
          <td colspan="2" class="px-4 sm:px-6 py-8 text-center">
            <p class="text-gray-500 dark:text-gray-400">
              Aucune produit trouvée. Cliquez sur "Ajouter" pour en créer une.
            </p>
          </td>
        </tr>
        }
        @for (produit of produits; track produit._id) {
        <tr>
          <td class="px-4 sm:px-6 py-3.5">
            <p class="text-gray-700 text-theme-sm dark:text-gray-400">
              {{ produit.nomProduit }}
            </p>
          </td>

          <td class="px-4 sm:px-6 py-3.5">
            <p class="text-gray-700 text-theme-sm dark:text-gray-400">
              {{ produit.prix }}
            </p>
          </td>

          <td class="px-4 sm:px-6 py-3.5">
            <p class="text-gray-700 text-theme-sm dark:text-gray-400">
              {{ produit.nombre }}
            </p>
          </td>

      </tbody>
    </table>
  </div>
