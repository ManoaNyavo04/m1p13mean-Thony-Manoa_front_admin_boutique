<div class="min-h-screen xl:flex">
  <div>
    <app-sidebar></app-sidebar>
    <app-backdrop></app-backdrop>
  </div>
  <div
      class="flex-1 transition-all duration-300 ease-in-out"
      [ngClass]="{
        'xl:ml-[290px]': (isExpanded$ | async) || (isHovered$ | async),
        'xl:ml-[90px]': !(isExpanded$ | async) && !(isHovered$ | async),
        'ml-0': (isMobileOpen$ | async)
      }"
  >
    <!-- app header start -->
    <app-header/>
    <!-- app header end -->
    <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
      <router-outlet></router-outlet>
    </div>
    <!-- footer start -->
    <footer class="py-4 text-center border-t border-gray-200 dark:border-white/[0.05]">
      <p class="text-sm text-gray-600 dark:text-gray-400">
        © 2025 - Développé par <span class="font-medium">RASOLOFONDRAINIBE Thony</span> & <span class="font-medium">RANDRIANARISON Manoa</span>
      </p>
    </footer>
    <!-- footer end -->
  </div>
</div>
